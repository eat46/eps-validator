name: Validate EPS Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # 讓我們可以在 GitHub 網頁上點按鈕手動觸發

jobs:
  validate:
    runs-on: ubuntu-latest # 使用雲端的 Linux 伺服器跑你的程式

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4 # 把你的程式碼複製到雲端電腦上

      - name: Setup Python
        uses: actions/setup-python@v5 # 在雲端安裝 Python 環境
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run validator
        run: |
          # 執行你的主程式！
          python src/main.py

      - name: Upload validation report
        if: always() # 就算前面的步驟因為 sys.exit(1) 失敗了，這一步也一定要執行
        uses: actions/upload-artifact@v4 # 把產出的報告打包，讓你在網頁上下載
        with:
          name: validation-report
          path: output/reports/